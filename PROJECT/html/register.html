<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>

</head>
<body>
    <section class="register">
        <div class="container">
            <h1>Register Your Account</h1>
            <form action="">
               <div class="fullname">
                 <label for="fullname">Full name </label><br>
                 <input type="text" id="fullname" name="fullname" title="provide full name" required  minlength="3">
               </div>
               <div class="email">
                    <label for="email">Email address</label><br>
                    <input type="text" id="email" name="email" title="Provide email address" required  >
               </div>
               <div class="phone-number">
                    <label for="mobile">Phone Number</label><br>
                    <input type="tel" id="mobile" name="mobile" title="provide your mobile number "  min-length="10" maxlength="10" required>
               </div>
               <div class="password">                    
                        <label for="password">Password</label><br>
                        <input type="password" id="password" title="provide password here" max-length="20" required>                           
              </div>
               <div class="confirm-password">
                         <label for="confirm-password">Confirm Password</label><br>
                         <input type="password" id="confirm-password" name="confirm-pasword" title="Confirm pasword" max-length="20" required>
                </div>
               <div class="create-account">
                <a href="../html/loginpage.html"> Already have an account?</a>
                <span> &MediumSpace;</span>
                <a href="../html/home.html" ><button type="submit">Sign in</button></a>
               </div>
               <div class="btn">
                    <button type="submit" href="../html/home.html">Login</button>
               </div>
            </form>
        </div>
    </section>
</body>
</html>
